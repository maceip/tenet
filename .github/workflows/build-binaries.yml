name: build-binaries

# Builds the single-file `por` (tenet) node binary for each shipped platform.
# Desktop targets use PyInstaller via scripts/build_binary.py. The Android
# target is an aarch64-Linux binary that runs on Android under Termux; a
# packaged APK is a separate effort, blocked on Android wheels for the native
# crypto dependencies (see the `android` job notes below).

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-cov
      - name: Run suite
        run: pytest -q --cov=tenet

  build:
    name: ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build binary
        run: python scripts/build_binary.py --name por-${{ matrix.target }} --also-name tenet-${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: por-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  android:
    # Android target = full, functional client on the device today, as an
    # aarch64-Linux binary that runs under Termux (Android's Linux userspace).
    #
    # A packaged .apk is the eventual goal and would be built with the NDK via
    # python-for-android (buildozer) — the NDK is not the blocker. The blocker
    # is p4a recipes: pynacl/libsodium, cryptography, and msgpack have recipes,
    # but aioquic and pqcrypto do not, and cryptography also needs the
    # Rust-for-Android targets. Until those recipes exist + are validated on a
    # real Android build, an .apk would ship a crippled client (no QUIC
    # transport, no post-quantum signatures), so we ship the complete aarch64
    # binary instead. APK milestone tracked separately. Non-blocking.
    name: android-aarch64 (termux)
    needs: test
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build aarch64 binary
        run: python scripts/build_binary.py --name por-android-aarch64 --also-name tenet-android-aarch64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: por-android-aarch64
          path: dist/*
          if-no-files-found: error

  release:
    name: github-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: por-*
          merge-multiple: true
      - name: Select release binaries
        run: |
          mkdir -p release
          shopt -s nullglob
          for f in dist/tenet-linux-x86_64 dist/tenet-macos-arm64 dist/tenet-windows-x86_64.exe; do
            if [[ -f "$f" ]]; then
              cp "$f" release/
            fi
          done
          ls -la release/
      - name: Checksums
        run: |
          cd release
          find . -type f ! -name 'SHA256SUMS' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          generate_release_notes: true
