name: android-apk

# Builds the tenet Android APK: cross-compile the native wheels (msgpack, cffi
# +libffi, pynacl +libsodium), build the pure-Python wheels (pyaes, dilithium-py),
# then package the full por client with Briefcase. See docs/android-build.md.
#
# UDP-only v0 client, arm64-v8a, API 21, Python 3.13. On-device validation
# (TENET-FULL-CLIENT-OK on an emulator) is a local/manual step — an arm64
# emulator is impractical on x86_64 CI runners.

on:
  push:
    branches: [master, main, android-apk]
    paths:
      - "android/**"
      - "por/**"
      - "sphinxmix/**"
      - "scripts/android/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" \
                     "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Build wheels + APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: bash scripts/android/build_apk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tenet-android-apk
          path: android/build/tenet/android/gradle/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
