[pytest]
markers =
    crypto: sphinxmix cryptographic regression tests (slow, not product path)
    integration: multi-process or threaded runtime tests
    product: end-to-end P-OR paths that should gate releases
    live: hits the production attested matcher (needs aw + network; opt-in)
    network_beta: hits live/product answer-delivery paths that require relay + expert ops
    network_beta_multivm: cross-VM beta harness (needs config/gate-b-topology.json)
addopts = -ra --strict-markers -m "not live"
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = tenet
branch = True

[coverage:report]
show_missing = True
skip_empty = True
# Locked to the post-consolidation baseline (deleting the dead JSON wire path
# and the manual reimplementation tests raised this from 72). Do not lower
# without justification; raise it as connectivity-core teeth land.
fail_under = 78
